modLoader = "kotlinforforge"

loaderVersion = "[4,)"
license = "${license}"
issueTrackerURL="https://github.com/hybridlabs/hybrid_birds/issues"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "${mod_name}"
displayURL= "https://github.com/hybridlabs/hybrid_birds"
logoFile = "${mod_id}.png"
credits = '''${credits}'''
authors = "${mod_author}"
description = '''${description}'''
enumExtensions="META-INF/enumextensions.json"

[[mixins]]
config = "hybrid_birds.forge.mixins.json"

[[dependencies.${mod_id}]]
modId = "neoforge"
mandatory = true
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "geckolib"
mandatory = true
versionRange = "[4.7.4,)"
side = "BOTH"